server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: redireciona rotas desconhecidas para index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para a API do backend
    location /api {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy para uploads servidos pelo backend
    location /uploads {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=604800";
    }

    # Cache agressivo para assets estáticos do bundle Vite
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
