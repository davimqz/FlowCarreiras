spring:
  application:
    name: flowcarreiras-api

  datasource:
    url: jdbc:h2:mem:flowcarreiras;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true
    defer-datasource-initialization: true

  sql:
    init:
      mode: never

  h2:
    console:
      enabled: true
      path: /h2-console

  servlet:
    multipart:
      enabled: true
      max-file-size: 30MB
      max-request-size: 35MB

storage:
  upload-dir: ./uploads

jwt:
  secret: Zmxvd2NhcnJlaXJhcy1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW5zLTI1NmJpdA==
  expiration: 86400000

server:
  port: 8080

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/flowcarreiras
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

---
# Perfil Docker — ativado automaticamente pelo docker-compose.yml
# Difere de "prod": usa ddl-auto: update (Hibernate cria/atualiza tabelas)
# e aponta para o container "db" dentro da rede Docker.
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://db:5432/flowcarreiras}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

storage:
  upload-dir: ${UPLOAD_DIR:/app/uploads}

jwt:
  secret: ${JWT_SECRET:Zmxvd2NhcnJlaXJhcy1zZWNyZXQta2V5LWZvci1qd3QtdG9rZW5zLTI1NmJpdA==}
  expiration: 86400000

seed:
  teste-senha: ${SEED_PASSWORD:senha123}
